services:
  ska-site-tui:
    build: .
    image: ghcr.io/sakuraofficial/ska-site-tui:latest
    container_name: ska-site-tui
    restart: unless-stopped
    ports:
      - "${PORT:-2222}:2222"
    volumes:
      - ./data/keys:/app/.keys
      - ./.data:/app/.data
    environment:
      - PORT=2222
